<template>
    <lightning-card>
        <template if:true={imageUrl}>
            <div class="image-wrapper">
                <img src={imageUrl} alt="Drive Image" class="drive-image"/>
            </div>
        </template>
 
        <template if:false={imageUrl}>
            <div class="placeholder">
                No Image Uploaded
            </div>
        </template>
    </lightning-card>
</template>
