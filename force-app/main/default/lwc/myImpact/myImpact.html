<template>
    <template if:true={impact}>
        <div class="impact-container slds-p-around_large">
 
            <h1 class="title">
                🌍 My Impact Journey
            </h1>
 
            <div class="metrics">
 
                <div class="metric-box">
                    <div class="number">{animatedHours}</div>
                    <div class="label">Hours Contributed</div>
                </div>
 
                <div class="metric-box">
                    <div class="number">{animatedPoints}</div>
                    <div class="label">Total Points</div>
                </div>
 
            </div>
 
            <div class="progress-section">
 
                <div class="progress-bar">
                    <div class="progress-fill" style={progressStyle}></div>
                </div>
 
                <p class="progress-text">
                    {impact.progressPercent}% progress to next badge
                </p>
 
            </div>
 
            <div class="badge-section">
 
                <img src={badgeImage} class="badge-img"/>
 
                <h3 class="badge-title">
                    {impact.badge}
                </h3>
 
            </div>
 
            <template if:true={impact.certificateAvailable}>
                <div class="certificate-button">
                    <lightning-button
                        label="Download Certificate"
                        variant="brand"
                        onclick={handleDownload}>
                    </lightning-button>
                </div>
            </template>
 
        </div>
    </template>
</template>
