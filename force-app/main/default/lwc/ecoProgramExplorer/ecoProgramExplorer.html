<template>
    <lightning-card title="Program Initiatives" icon-name="standard:event">
        <div slot="actions">
            <span class="slds-badge slds-theme_success">Total: {driveCount}</span>
        </div>

        <div class="slds-p-around_medium explorer-container">
            <template if:true={drives.length}>
                <div class="slds-grid slds-wrap slds-gutters">
                    <template for:each={drives} for:item="drive">
                        <div key={drive.Id} class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <div class="drive-row slds-box slds-grid slds-grid_vertical-align-center">
                                <div class="slds-col slds-size_2-of-3">
                                    <h3 class="slds-text-heading_small"><strong>{drive.Name}</strong></h3>
                                    <p class="slds-text-color_weak">{drive.City__c}, {drive.State__c}</p>
                                    <p class="slds-text-title_caps slds-m-top_xx-small">{drive.Drive_Date__c}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                                    <lightning-button 
                                        label="Join Now" 
                                        variant="brand" 
                                        data-id={drive.Id} 
                                        onclick={handleJoinClick}
                                        class="custom-button">
                                    </lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
