<template>
    <div class="dashboard-wrapper">
        <div class="slds-container_large">
            
            <div class="slds-text-align_center slds-m-bottom_x-large">
                <h2 class="header-title">🌍 Eco Impact Dashboard</h2>
                <p>See how our community is making a difference.</p>
            </div>

            <div class="slds-grid slds-wrap slds-gutters_large">
                <template for:each={statsArray} for:item="stat">
                    <div key={stat.label} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-m-bottom_medium">
                        <div class="impact-card">
                            <div class="stat-number">{stat.value}</div>
                            <div class="stat-label">{stat.label}</div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
