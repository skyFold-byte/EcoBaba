<template>
    <div class="auth-card">
        <h2 class="form-title">Reset Password</h2>
        <p class="description">Enter your email or phone to receive a reset link.</p>
        
        <lightning-input 
            label="Email or Phone" 
            type="text" 
            data-id="identifier" 
            onchange={handleInput} 
            required>
        </lightning-input>

        <button class="submit-btn" onclick={handleReset}>Send Reset Link</button>
        <p class="footer-text"><a href="/login">Back to Login</a></p>
    </div>
</template>
