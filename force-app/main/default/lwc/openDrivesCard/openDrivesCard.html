<template>
    <div class="slds-grid slds-wrap slds-gutters slds-p-around_small">
        <template for:each={drives} for:item="d">
            <div key={d.id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-m-bottom_medium">
                <div class="card">
                    <div class="header slds-truncate">{d.name}</div>
                    <img src={d.imageUrl} class="img" alt={d.name}>
                    <div class="body">
                        <p>📍 {d.venue}</p>
                        <p>📅 {d.driveDate} | {d.driveTime}</p>
                        <p class="spots">🔥 {d.spotsLeft} Spots Left</p>
                        
                        <button class="btn" onclick={handleRegister} data-id={d.id} disabled={d.isFull}>
                            <template lwc:if={d.isFull}>Full</template>
                            <template lwc:else>Register</template>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
